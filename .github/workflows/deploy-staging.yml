name: Deploy to Staging

on:
  push:
    branches: [develop]

jobs:
  deploy:
    # Only run on tranducliem/yolo — NOT on ryo2gxo/yolo (Vercel handles that)
    if: github.repository == 'tranducliem/yolo'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger deploy webhook
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            https://yolo.gxo.co.jp/webhook/deploy \
            -H 'Content-Type: application/json' \
            -d "{\"token\":\"${{ secrets.DEPLOY_WEBHOOK_SECRET }}\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "Response: $BODY"
          echo "HTTP Code: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Deploy webhook failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Deploy triggered successfully!"
